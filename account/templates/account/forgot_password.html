{% extends 'main/base_auth.html' %}
{% load static %}
{% block title %}Forgot Password{% endblock %}

{% block content %}

<style>
body {
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  min-height: 100vh;
  font-family: "Poppins", sans-serif;
}

.forgot-wrapper {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.forgot-card {
  width: 420px;
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(18px);
  padding: 50px 40px;
  border-radius: 26px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.45);
  animation: slideIn .6s ease;
  color: white;
}

.forgot-title {
  font-size: 28px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 5px;
}

.forgot-subtitle {
  text-align: center;
  font-size: 14px;
  color: #c7d2fe;
  margin-bottom: 30px;
}

.form-group {
  margin-bottom: 18px;
  text-align: center;
}

.form-group label {
  display: block;
  max-width: 320px;
  margin: 0 auto 6px;
  text-align: left;
  font-size: 13px;
  font-weight: 500;
  opacity: 0.9;
}

.form-control {
  width: 100%;
  max-width: 320px;
  margin: 0 auto;
  padding: 13px 14px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  background: #f8fafc;
  color: #111;
  height: 50px;
  transition: 0.25s ease;
}

.form-control:focus {
  outline: none;
  box-shadow: 0 0 0 3px rgba(99,102,241,.35);
}

.btn-reset {
  display: block;
  max-width: 320px;
  width: 100%;
  margin: 10px auto 0;
  padding: 13px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #6366f1, #3b82f6);
  color: white;
  font-weight: 600;
  font-size: 15px;
  transition: 0.3s ease;
}

.btn-reset:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px rgba(99,102,241,.45);
}

.helper-links {
  text-align: center;
  margin-top: 22px;
  font-size: 14px;
}

.helper-links a {
  color: #a5b4fc;
  text-decoration: none;
}

.helper-links a:hover {
  text-decoration: underline;
}

.alert {
  max-width: 320px;
  margin: 0 auto 15px;
  border-radius: 12px;
}

@keyframes slideIn {
  from {opacity:0; transform: translateY(25px);}
  to {opacity:1; transform: translateY(0);}
}
</style>

<div class="forgot-wrapper">
  <div class="forgot-card">

    <h2 class="forgot-title">Forgot Password</h2>
    <p class="forgot-subtitle">Enter your email to receive a reset link</p>

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" name="email" id="email"
               class="form-control"
               placeholder="Enter your email"
               required>
      </div>

      <button type="submit" class="btn-reset">Send Reset Link</button>
    </form>

    <div class="helper-links">
      <p>
        <a href="{% url 'account:login' %}">← Back to Login</a>
      </p>
    </div>

  </div>
</div>

{% endblock %}
