{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}Staff{% endblock %}</title>

<!-- Icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<style>

.custom-table-head th{
    background:#0f1b2d;
    color:white;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
}

/* MOBILE VERSION (screens below 768px) */
@media (max-width: 768px) {
    .sidebar {
        display: none !important;
    }

    .main {
        margin-left: 0 !important;
        width: 100% !important;
    }

    .navbar {
        left: 0 !important;
        width: 100% !important;
    }

    .content {
        padding: 15px !important;
    }
}
/* Global Layout */
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#f4f6fb;
    overflow-x:hidden;
}

/* NAVBAR – FULL WIDTH ON TOP */
.navbar{
    background:#0f1b2d;
    color:white;
    height:60px;
    width:100%;
    position:fixed;
    top:0;
    left:0;
    right:0;   /* ADD THIS */
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
    z-index:1000;
    border-radius:0;
}

.nav-left h3{
    margin:0;
    font-weight:500;
}

.company{
    font-size:12px;
    color:#9ca3af;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:10px;
}

/* NAV TITLE IMPROVED */
.nav-left {
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.nav-left h3 {
    font-size:22px;
    font-weight:600;
    margin-bottom:2px;
}

.company {
    font-size:13px;
    color:#cbd5e1;
    display:flex;
    align-items:center;
    gap:6px;
    margin-top:-2px;
    opacity:0.9;
}

.company i {
    font-size:12px;
    opacity:0.8;
}

/* SIDEBAR – NOW BELOW NAVBAR */
.sidebar{
    width:230px;
    background:#0f1b2d;
    color:white;
    position:fixed;
    top:60px;                 /* sidebar starts UNDER the navbar */
    left:0;
    min-height:calc(100vh - 60px);
    padding:25px 20px;
}

.sidebar h2{
    margin-bottom:30px;
    font-weight:600;
    letter-spacing:1px;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:#cbd5e1;
    padding:12px;
    border-radius:6px;
    margin-bottom:6px;
    transition:0.2s;
    font-size:14px;
}

.sidebar a:hover{
    background:#1e293b;
    color:white;
}

/* SIDEBAR LINKS */
.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:#cbd5e1;
    padding:12px;
    border-radius:6px;
    margin-bottom:6px;
    transition:0.25s;
    font-size:14px;
}

/* HOVER EFFECT */
.sidebar a:hover{
    background:#2563eb;
    color:white;
}

/* ACTIVE PAGE */
.sidebar a.active{
    background:#2563eb;
    color:white;
    font-weight:600;
}

/* MAIN CONTENT */
.main{
    margin-left:230px;
    padding-top:60px;
}

.content{
    padding:30px 35px;
}

.nav-avatar{
    width:35px;
    height:35px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #ffffff;
}

.welcome-text{
    font-weight:500;
}

.logo-title {
    display:flex;
    align-items:center;
    gap:12px;
}

.nav-logo {
    height:40px;
    width:40px;
    object-fit:cover;
    border-radius:50%;
    border:2px solid #ffffff20; /* subtle border para elegant */
}

.text-group {
    display:flex;
    flex-direction:column;
}

.text-group h3 {
    font-size:22px;
    font-weight:700;
    margin:0;
}

.company {
    font-size:13px;
    color:#cbd5e1;
    display:flex;
    align-items:center;
    gap:6px;
    margin-top:3px;
    opacity:0.9;
}

.company i {
    font-size:12px;
    opacity:0.8;
}

.logout-link {
    color: #dc3545; /* red */
    text-decoration: none;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 8px;
    transition: 0.3s;
}

.logout-link {
    color: #dc3545 !important;  /* force red */
}

.logout-link span {
    color: #dc3545 !important;
}

.logout-link i {
    color: #dc3545;
}

.logout-link:hover {
    background-color: rgba(220, 53, 69, 0.1); /* light red hover */
    color: #ff4d5a;
}

/* HAMBURGER BUTTON */
.hamburger {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
}

/* OVERLAY */
.overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 999;
}

@media (max-width: 768px) {
    .hamburger {
        display: block !important;
    }

    .sidebar {
        left: -230px !important;
        transition: 0.3s ease;
        z-index: 1001;
    }

    .sidebar.open {
        left: 0 !important;
    }

    .overlay.open {
        display: block !important;
    }

    .main {
        margin-left: 0 !important;
        width: 100% !important;
    }

    .content {
        padding: 15px !important;
    }
}

</style>

</head>


<body>

    <!-- NAVBAR -->
    <div class="navbar">
        {% load static %}

        <div class="nav-left">
            <div class="logo-title">
                <img src="{% static 'images/p77_logo.png' %}" alt="P77 Logo" class="nav-logo">
                <button class="hamburger" id="hamburgerBtn">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="text-group">
                    <h3>Dashboard</h3>
                    <div class="company">
                        <i class="fa-solid fa-building"></i>
                        P77 Petroleum Distribution Inc.
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>P77 Staff</h2>

        <a href="{% url 'staff_dashboard' %}"
           class="{% if request.resolver_match.url_name == 'staff_dashboard' %}active{% endif %}">
            <i class="fa-solid fa-chart-line"></i>
            Dashboard
        </a>

        <a href="{% url 'submit_inventory' %}"
           class="{% if request.resolver_match.url_name == 'submit_inventory' %}active{% endif %}">
            <i class="fa-solid fa-gas-pump"></i>
            Submit Inventory
        </a>

        <a href="{% url 'my_reports' %}"
           class="{% if request.resolver_match.url_name == 'my_reports' %}active{% endif %}">
            <i class="fa-solid fa-file-lines"></i>
            My Reports
        </a>


        <a href="{% url 'account:logout' %}"
           class="logout-link {% if request.resolver_match.url_name == 'logout' %}active{% endif %}">
           <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <div class="content">
            <!-- MESSAGES -->
            {% if messages %}
            <div class="position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 1080;">
              {% for message in messages %}
                <div class="toast align-items-center border-0 text-white
                            {% if message.tags == 'success' %}bg-success
                            {% elif message.tags == 'error' or message.tags == 'danger' %}bg-danger
                            {% elif message.tags == 'warning' %}bg-warning text-dark
                            {% elif message.tags == 'info' %}bg-info
                            {% else %}bg-secondary
                            {% endif %}"
                     role="alert" aria-live="assertive" aria-atomic="true"
                     data-bs-delay="3000">

                  <div class="d-flex">
                    <div class="toast-body">
                      {{ message }}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto"
                            data-bs-dismiss="toast"></button>
                  </div>

                </div>
              {% endfor %}
            </div>
            {% endif %}
            {% block content %}
            {% endblock %}
        </div>
    </div>

<script>
const hamburger = document.getElementById('hamburgerBtn');
const sidebar = document.querySelector('.sidebar');
const overlay = document.getElementById('overlay');

hamburger.addEventListener('click', function() {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
});

overlay.addEventListener('click', function() {
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const toastElList = document.querySelectorAll('.toast');
    toastElList.forEach(function(toastEl) {
        const toast = new bootstrap.Toast(toastEl);
        toast.show();
    });
});
</script>

</body>
