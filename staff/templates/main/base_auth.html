{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'images/p77_favicon.png' %}">
    <title>{% block title %}P77 Inventory Monitoring{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- ✅ TOAST (GLOBAL) -->
    {% if messages %}
    <div class="position-fixed start-50 translate-middle-x p-3"
         style="top: 10px; z-index: 1080;">
      {% for message in messages %}
        <div class="toast text-white border-0
            {% if message.tags == 'success' %}bg-success
            {% elif message.tags == 'error' or message.tags == 'danger' %}bg-danger
            {% elif message.tags == 'warning' %}bg-warning
            {% elif message.tags == 'info' %}bg-info
            {% else %}bg-secondary
            {% endif %}"
            data-bs-delay="5000">

          <div class="d-flex">
            <div class="toast-body">
              {{ message }}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
          </div>

        </div>
      {% endfor %}
    </div>
    {% endif %}

    <!-- ✅ PAGE CONTENT -->
    {% block content %}
    {% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const toastElList = document.querySelectorAll('.toast');
        toastElList.forEach(function(toastEl) {
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        });
    });
    </script>

</body>
</html>
